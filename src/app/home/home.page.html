<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>home</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">home</ion-title>
    </ion-toolbar>
  </ion-header>
  <div id="container">
   {{loading$ | async}} 
    <div *ngFor="let task of (taskList$ | async)">
      {{ task.label }}
    </div>
  </div>
</ion-content>
